<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chicago Crime Explorer</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
        }
        #heatmap {
            width: 600px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
        #controls p {
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h1>Chicago Crime Explorer</h1>

<div id="controls">

    <p>
        Crime Group:
        <span data-var="crimeGroup"
              data-class="TKSelect"
              data-options="Drug_Vice, Other, Property, Public_Order, Violent, White_Collar"></span>
    </p>

    <p>
        Location Group:
        <span data-var="locationGroup"
              data-class="TKSelect"
              data-options="Commercial_Retail, Entertainment, Government_Institutional, Industrial_Warehouse, Other_Unknown, Parks_Outdoor, Residential, School_Childcare, Street_Sidewalk, Transit_Vehicle"></span>
    </p>

    <p>
        Year:
        <span data-var="year"
              data-class="TKSlider"
              data-min="2001"
              data-max="2024"
              data-step="1"></span>
    </p>

</div>

<img id="heatmap" src="" alt="Heatmap will appear here">

<!-- Load your Tangle core + widgets -->
<script src="TangleKit.js"></script>

<!-- Your app logic (model, observers, filename updates) -->
<script src="app.js"></script>

</body>
</html>
