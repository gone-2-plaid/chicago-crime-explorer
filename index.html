<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chicago Crime Explorer</title>

    <!-- Tangle Core -->
    <script src="https://gone-2-plaid.github.io/chicago-crime-explorer/Tangle.js"></script>

    <!-- TangleKit -->
    <link rel="stylesheet" href="https://gone-2-plaid.github.io/chicago-crime-explorer/TangleKit/TangleKit.css">
    <script src="https://gone-2-plaid.github.io/chicago-crime-explorer/TangleKit/TangleKit.js"></script>

    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
        }
        #heatmap {
            width: 600px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Chicago Crime Explorer</h1>

<div id="controls">

<p>
    Crime Group:
    <span data-var="crimeGroup"
          data-options="Drug_Vice,Other,Property,Public Order,Violent,White Collar"
          class="TKSelect"></span>
</p>

<p>
    Location Group:
    <span data-var="locationGroup"
          data-options="Commercial Retail,Entertainment,Government_Institutional,Industrial_Warehouse,Other_Unknown,Parks_Outdoor,Residential,School_Childcare,Street_Sidewalk,Transit_Vehicle"
          class="TKSelect"></span>
</p>

<p>
    Year:
    <span data-var="year"
          data-min="2001"
          data-max="2024"
          class="TKSlider"></span>
</p>

</div>

<img id="heatmap" data-var="heatmapSrc" alt="Heatmap will appear here">

<!-- Your app logic (load this LAST) -->
<script src="app.js"></script>

</body>
</html>
